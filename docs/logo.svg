<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- JG Systems Consulting square brand mark (brand tokens: ink #0a0a0b / paper #f4f2ec) -->
  <rect width="256" height="256" fill="#0a0a0b"/>

  <!-- Circuit-board monogram circle -->
  <circle cx="128" cy="128" r="88" fill="none" stroke="#f4f2ec" stroke-width="4"/>

  <!-- Circuit trace dots on perimeter (8, every 45°) -->
  <circle cx="128" cy="40"  r="5" fill="#f4f2ec"/>
  <circle cx="190" cy="66"  r="5" fill="#f4f2ec"/>
  <circle cx="216" cy="128" r="5" fill="#f4f2ec"/>
  <circle cx="190" cy="190" r="5" fill="#f4f2ec"/>
  <circle cx="128" cy="216" r="5" fill="#f4f2ec"/>
  <circle cx="66"  cy="190" r="5" fill="#f4f2ec"/>
  <circle cx="40"  cy="128" r="5" fill="#f4f2ec"/>
  <circle cx="66"  cy="66"  r="5" fill="#f4f2ec"/>

  <!-- Short inward traces -->
  <line x1="128" y1="40"  x2="128" y2="56"  stroke="#f4f2ec" stroke-width="2"/>
  <line x1="216" y1="128" x2="200" y2="128" stroke="#f4f2ec" stroke-width="2"/>
  <line x1="128" y1="216" x2="128" y2="200" stroke="#f4f2ec" stroke-width="2"/>
  <line x1="40"  y1="128" x2="56"  y2="128" stroke="#f4f2ec" stroke-width="2"/>

  <!-- JG monogram -->
  <text x="128" y="150" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="62"
        font-weight="700" fill="#f4f2ec" text-anchor="middle" letter-spacing="2">JG</text>
</svg>
